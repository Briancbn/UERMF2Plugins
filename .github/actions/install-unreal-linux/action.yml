name: Install Unreal Engine
inputs:
  unreal-engine-zip:
    required: true
    type: string
  unreal-program-name:
    required: true
    type: string
runs:
  using: composite
  steps:
    # Test-only probe: this composite action is loaded via a local path
    # (`uses: ./.github/actions/install-unreal-linux`) from whatever the
    # calling job's checkout step resolved. For a `pull_request` build,
    # that checkout defaults to the PR's merge ref - so a PR editing this
    # file runs its own code here, in the same job, *after* AWS
    # credentials have already been exported by the "Configure AWS
    # Credentials" step in buildLinux.yml. This step only proves reach
    # (no secret value is printed or transmitted anywhere).
    - name: Probe - credential reachability from a locally-checked-out action
      shell: bash
      run: |
        if [ -n "$AWS_ACCESS_KEY_ID" ]; then
          echo "REACHED: AWS credentials were already present in this composite action's env, with no approval step in between."
        else
          echo "REACHED: this composite action step ran; AWS credential env vars are empty/unset in this scope."
        fi
    - name: Download Unreal Engine
      shell: bash
      run: |
        aws s3 cp ${{ inputs.unreal-engine-zip }} ./ue.zip --no-progress
    - name: Unzip Unreal Engine
      shell: bash
      run: |
        mkdir -p /mnt/work/${{ inputs.unreal-program-name }}
        # Selectively extract files in order to save disk space
        unzip -q ./ue.zip "Engine/*" -d /mnt/work/${{ inputs.unreal-program-name }} -x "Engine/Binaries/Android/*" "Engine/Binaries/LinuxArm64/*" "Engine/Intermediate/Build/Android/*" "Engine/Intermediate/Build/LinuxArm64/*"
        rm ./ue.zip
